language = "C"
pragma_once = false
cpp_compat = true
documentation = true
include_guard = "NX_FFI_H"
usize_is_size_t = true
autogen_warning = "/* This file is generated by tools/generate-nx-ffi-header.sh or tools/generate-nx-ffi-header.ps1. */"
no_includes = true
after_includes = """
#include <stddef.h>
#include <stdint.h>

#ifdef _WIN32
#define NX_FFI_EXPORT __declspec(dllimport)
#else
#define NX_FFI_EXPORT
#endif
"""

[parse]
parse_deps = false

[export]
include = [
    "NX_FFI_ABI_VERSION",
    "NxBuffer",
    "NxEvalStatus",
    "NxOutputFormat",
    "NxLibraryRegistryHandle",
    "NxProgramArtifactHandle",
    "NxProgramBuildContextHandle",
    "nx_ffi_abi_version",
    "nx_build_program_artifact",
    "nx_create_library_registry",
    "nx_create_program_build_context",
    "nx_eval_program_artifact",
    "nx_eval_source",
    "nx_free_library_registry",
    "nx_free_program_artifact",
    "nx_free_program_build_context",
    "nx_component_init_program_artifact",
    "nx_component_dispatch_actions_program_artifact",
    "nx_load_library_into_registry",
    "nx_free_buffer",
]

[fn]
prefix = "NX_FFI_EXPORT"

[enum]
prefix_with_name = true
