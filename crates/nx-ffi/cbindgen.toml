language = "C"
pragma_once = false
cpp_compat = true
documentation = true
include_guard = "NX_FFI_H"
usize_is_size_t = true
autogen_warning = "/* This file is generated by tools/generate-nx-ffi-header.sh or tools/generate-nx-ffi-header.ps1. */"
no_includes = true
after_includes = """
#include <stddef.h>
#include <stdint.h>

#ifdef _WIN32
#define NX_FFI_EXPORT __declspec(dllimport)
#else
#define NX_FFI_EXPORT
#endif
"""

[parse]
parse_deps = false

[export]
include = [
    "NX_FFI_ABI_VERSION",
    "NxBuffer",
    "NxEvalStatus",
    "nx_ffi_abi_version",
    "nx_eval_source_json",
    "nx_eval_source_msgpack",
    "nx_free_buffer",
]

[fn]
prefix = "NX_FFI_EXPORT"

[enum]
prefix_with_name = true
